version: "3.9"

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: procurement_db
    environment:
      SA_PASSWORD: "${MSSQL_SA_PASSWORD:-StrongP@ss123!}"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-StrongP@ss123!}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./docker/init-db.sh:/init-db.sh
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${MSSQL_SA_PASSWORD:-StrongP@ss123!}" -Q "SELECT 1" -No
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - procurement_net

  init-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    networks:
      - procurement_net
    entrypoint: >
      bash -c "
      echo 'Waiting for DB...' &&
      sleep 5 &&
      /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P '$MSSQL_SA_PASSWORD' -No -Q \"
      IF DB_ID('ProcurementDB') IS NULL
      BEGIN
          CREATE DATABASE ProcurementDB COLLATE Vietnamese_CI_AS;
      END
      \" &&
      echo 'DB ready'
      "

  redis:
    image: redis:7-alpine
    container_name: procurement_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - procurement_net

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: procurement_web
    command: >
      sh -c "
        python manage.py wait_for_db &&
        python manage.py makemigrations authentication &&
        python manage.py migrate authentication &&
        python manage.py migrate &&
        python manage.py seed_roles &&
        python manage.py makemigrations master_data &&
        python manage.py migrate master_data &&
        python manage.py makemigrations cart &&
        python manage.py migrate cart &&
        python manage.py makemigrations finance &&
        python manage.py migrate finance &&
        python manage.py makemigrations ipo &&
        python manage.py migrate ipo &&
        python manage.py makemigrations notifications &&
        python manage.py migrate notifications &&
        python manage.py makemigrations reports &&
        python manage.py migrate reports &&
        python manage.py makemigrations audit_log &&
        python manage.py migrate audit_log &&
        python manage.py makemigrations requisition &&
        python manage.py migrate requisition &&
        python manage.py makemigrations warehouse &&
        python manage.py migrate warehouse &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000
      "
    volumes:
      - .:/app
      - media_files:/app/media
      - static_files:/app/static_collected
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - procurement_net

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: procurement_celery
    command: celery -A config worker -l info -Q default,notifications
    volumes:
      - .:/app
      - media_files:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - procurement_net

  nginx:
    image: nginx:alpine
    container_name: procurement_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/static
      - media_files:/media
    depends_on:
      - web
    networks:
      - procurement_net

volumes:
  mssql_data:
  redis_data:
  media_files:
  static_files:

networks:
  procurement_net:
    driver: bridge
